<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>&#24773;&#22577;&#8544;&#30693;&#35672;&#21839;&#38988;</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="https://mei-chan-nel.github.io/assets/favicon.svg" type="image/svg+xml" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6257644709224446" crossorigin="anonymous"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="start-panel" id="startView">
        <div class="start-layout">
          <div class="start-copy">
            <p class="eyebrow">&#20849;&#36890;&#12486;&#12473;&#12488;&#24773;&#22577;&#8544;</p>
            <h1>&#30693;&#35672;&#21839;&#38988;</h1>
            <p class="start-lead">第1問・第2問の基礎知識と基本計算の練習問題を出題します。</p>
            <div class="start-metrics" aria-label="&#20986;&#38988;&#23550;&#35937;">
              <div>
                <span>&#20986;&#38988;&#23550;&#35937;</span>
                <strong class="metric-loading" id="questionCount"></strong>
              </div>
              <div class="set-size-card">
                <span>1&#22238;</span>
                <div class="set-size-control" aria-label="&#20986;&#38988;&#25968;">
                  <strong id="setSizeValue">5&#21839;</strong>
                  <div class="stepper-stack">
                    <button class="stepper-button" id="increaseSetSizeButton" type="button" aria-label="&#20986;&#38988;&#25968;&#12434;&#22679;&#12420;&#12377;">&#9650;</button>
                    <button class="stepper-button" id="decreaseSetSizeButton" type="button" aria-label="&#20986;&#38988;&#25968;&#12434;&#28187;&#12425;&#12377;">&#9660;</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="start-controls">
            <section class="control-section" aria-labelledby="fieldHeading">
              <div class="control-head">
                <h2 id="fieldHeading">&#20986;&#38988;&#20998;&#37326;</h2>
                <button class="text-button" id="clearFiltersButton" type="button">全解除</button>
              </div>
              <div class="field-filters" id="fieldFilters">
                <label class="field-chip"><input type="checkbox" value="society_security" checked /><span>社会・セキュリティ</span></label>
                <label class="field-chip"><input type="checkbox" value="digital" checked /><span>デジタル表現</span></label>
                <label class="field-chip"><input type="checkbox" value="network" checked /><span>ネットワーク</span></label>
                <label class="field-chip"><input type="checkbox" value="data_db" checked /><span>データ活用・DB</span></label>
                <label class="field-chip"><input type="checkbox" value="algorithm" checked /><span>アルゴリズム</span></label>
                <label class="field-chip"><input type="checkbox" value="design" checked /><span>情報デザイン</span></label>
              </div>
            </section>

            <section class="control-section" aria-labelledby="calcHeading">
              <h2 id="calcHeading">&#35336;&#31639;&#21839;&#38988;</h2>
              <div class="segmented-control" id="calcMode" role="radiogroup" aria-label="&#35336;&#31639;&#21839;&#38988;">
                <label>
                  <input type="radio" name="calcMode" value="all" checked />
                  <span>&#12377;&#12409;&#12390;</span>
                </label>
                <label>
                  <input type="radio" name="calcMode" value="without" />
                  <span>&#38500;&#12367;</span>
                </label>
                <label>
                  <input type="radio" name="calcMode" value="only" />
                  <span>&#35336;&#31639;&#12384;&#12369;</span>
                </label>
              </div>
            </section>

            <button class="primary-button start-button" id="startButton" type="button" disabled>―読込中―</button>
          </div>
        </div>
      </section>

      <section class="status-bar" id="statusBar" aria-label="&#23398;&#32722;&#29366;&#27841;" hidden>
        <div class="progress-block">
          <div class="progress-label">
            <strong id="progressText">1/5</strong>
            <span id="setStatus">&#25361;&#25126;&#20013;</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </section>

      <section class="question-panel" id="questionView" aria-live="polite" hidden>
        <p class="stem" id="questionStem"></p>
        <div class="choices" id="choices"></div>
        <p class="question-source" id="questionSource"></p>

        <section class="result-panel" id="resultPanel" hidden>
          <div class="result-heading">
            <span class="result-mark" id="resultMark"></span>
            <strong id="resultTitle"></strong>
          </div>
          <p id="resultText"></p>
          <p class="explanation" id="explanation"></p>
        </section>

        <div class="actions">
          <button class="primary-button" id="nextButton" type="button">&#27425;&#12398;&#21839;&#38988;</button>
        </div>
      </section>

      <section class="summary-panel" id="summaryView" hidden>
        <div class="summary-head">
          <div>
            <p class="question-index">&#32080;&#26524;</p>
            <h1 id="summaryTitle">5&#21839;&#20013; 0&#21839;&#27491;&#35299;</h1>
          </div>
          <p class="summary-rate" id="summaryRate">0%</p>
        </div>

        <div class="summary-list" id="summaryList"></div>

        <div class="finish-actions">
          <button class="primary-button" id="retryButton" type="button">&#12418;&#12358;&#19968;&#24230;&#25361;&#25126;&#12377;&#12427;</button>
          <button class="secondary-button" id="finishButton" type="button">&#32066;&#20102;&#12377;&#12427;</button>
        </div>
      </section>
    </main>

    <!-- Reserved for a future advertising unit. -->
    <div class="ad-slot" aria-label="広告掲載予定" data-ad-slot="reserved"></div>

    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-title">共通テスト「情報Ⅰ」知識問題トレーニング</p>
        <nav class="footer-nav" aria-label="サイト情報">
          <a href="https://mei-chan-nel.github.io/">トップページ</a>
          <a href="https://mei-chan-nel.github.io/about.html">このサイトについて</a>
          <a href="https://mei-chan-nel.github.io/privacy.html">プライバシーポリシー</a>
        </nav>
      </div>
    </footer>

    <script src="./startup.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
